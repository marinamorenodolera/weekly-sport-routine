<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Marina · Routine Portal</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c10;
            --sf: #151519;
            --card: #1a1a22;
            --tx: #e8e8ec;
            --dm: #6a6a7e;
            --bd: #252530;
            --gl: #c8f45c;
            --co: #a85cf4;
            --r: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--tx);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* LOGIN OVERLAY */
        #login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
        }

        #login-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .login-box {
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        .login-box h1 {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--gl), var(--co));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-box p {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            color: var(--dm);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .login-box input {
            width: 100%;
            background: var(--sf);
            border: 1px solid var(--bd);
            padding: 16px;
            border-radius: 12px;
            color: var(--tx);
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.3s;
        }

        .login-box input:focus {
            border-color: var(--gl);
        }

        .login-box button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--tx);
            color: var(--bg);
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .login-box button:active {
            transform: scale(0.97);
        }

        /* HOME UI */
        #home-screen {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s 0.2s, transform 0.8s 0.2s;
        }

        #home-screen.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .home-header {
            margin-bottom: 40px;
        }

        .home-header h2 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .home-header p {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: var(--dm);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .phases-grid {
            display: grid;
            gap: 15px;
        }

        .phase-card {
            background: var(--sf);
            border: 1px solid var(--bd);
            padding: 24px;
            border-radius: var(--r);
            text-decoration: none;
            color: var(--tx);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: border-color 0.3s, background 0.3s, transform 0.2s;
        }

        .phase-card:hover {
            border-color: #3a3a4a;
            background: var(--card);
        }

        .phase-card:active {
            transform: scale(0.98);
        }

        .phase-info {
            text-align: left;
        }

        .phase-info b {
            font-size: 1rem;
            display: block;
            margin-bottom: 2px;
        }

        .phase-info span {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            color: var(--dm);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .phase-status {
            font-family: 'Space Mono', monospace;
            font-size: 0.5rem;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-active {
            background: rgba(200, 244, 92, 0.1);
            color: var(--gl);
        }

        .status-locked {
            background: rgba(255, 255, 255, 0.05);
            color: var(--dm);
            opacity: 0.6;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .day-card {
            background: var(--card);
            border: 1px solid var(--bd);
            padding: 16px 12px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--tx);
            text-align: center;
            transition: border-color 0.3s, background 0.3s, transform 0.2s;
        }

        .day-card:hover {
            border-color: var(--gl);
            background: var(--sf);
        }

        .day-card:active {
            transform: scale(0.96);
        }

        .day-card b {
            font-size: 0.85rem;
            display: block;
        }

        .day-card span {
            font-family: 'Space Mono', monospace;
            font-size: 0.5rem;
            color: var(--dm);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-top: 4px;
        }

        .glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: var(--gl);
            filter: blur(120px);
            border-radius: 50%;
            opacity: 0.05;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>

<body>
    <div class="glow" style="top: -10%; left: -10%"></div>
    <div class="glow" style="bottom: -10%; right: -10%; background: var(--co)"></div>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-box">
            <h1>Sport Portal</h1>
            <p>Marina · Private Access</p>
            <input type="password" id="pass-input" placeholder="Password" autofocus>
            <button onclick="checkPass()">Entrar</button>
            <p id="error-msg"
                style="color: var(--bo); margin-top: 15px; opacity: 0; font-size: 0.7rem; text-transform: none; letter-spacing: 0;">
                Password incorrecta. Inténtalo de nuevo.</p>
        </div>
    </div>

    <!-- HOME SCREEN -->
    <div id="home-screen">
        <div class="home-header">
            <h2>Plan Semanal</h2>
            <p>Selecciona tu Fase</p>
        </div>

        <div class="phases-grid">
            <a href="phase1.html" class="phase-card">
                <div class="phase-info">
                    <b>Phase 1</b>
                    <span>Semanas 1–4 · Glúteos & VMO</span>
                </div>
                <div class="phase-status status-active">Activo</div>
            </a>

            <div class="days-grid">
                <a href="dia1.html" class="day-card">
                    <b>Día 1</b>
                    <span>Glúteo</span>
                </a>
                <a href="dia2.html" class="day-card">
                    <b>Día 2</b>
                    <span>Cuádriceps</span>
                </a>
                <a href="dia3.html" class="day-card">
                    <b>Día 3</b>
                    <span>Glúteo</span>
                </a>
                <a href="dia4.html" class="day-card">
                    <b>Día 4</b>
                    <span>Isquiotibiales</span>
                </a>
                <a href="dia5.html" class="day-card">
                    <b>Día 5</b>
                    <span>Glúteo</span>
                </a>
                <a href="dia6.html" class="day-card">
                    <b>Día 6</b>
                    <span>Cardio</span>
                </a>
            </div>

            <div class="phase-card" style="opacity: 0.4; cursor: not-allowed">
                <div class="phase-info">
                    <b>Phase 2</b>
                    <span>Semanas 5–8 · Próximamente</span>
                </div>
                <div class="phase-status status-locked">Bloqueado</div>
            </div>
        </div>
    </div>

    <script>
    const PASS = 'Marina123';
    
    function checkPass() {
      const input = document.getElementById('pass-input').value;
      if (input === PASS) {
        localStorage.setItem('logged_in', 'true');
        showHome();
      } else {
        const error = document.getElementById('error-msg');
        error.style.opacity = 1;
        document.getElementById('pass-input').value = '';
        document.getElementById('pass-input').focus();
      }
    }

    // Enter key listener
    document.getElementById('pass-input').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') checkPass();
    });

    function showHome() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('home-screen').classList.add('visible');
    }

    // Check if already logged in
    window.onload = () => {
      if (localStorage.getItem('logged_in') === 'true') {
        showHome();
      }
    };
    </script>
</body>

</html>
